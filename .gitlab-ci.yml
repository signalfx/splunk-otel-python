default:
  image: 'python:3.11-slim'

include:
  - project: core-ee/signing/api-integration
    # Keep this pinned to an immutable commit. To update, choose a reviewed commit
    # from core-ee/signing/api-integration and validate this CI config in GitLab.
    ref: addd76a1d97a8b19db80f40fe4f7830d2374303d
    file: /templates/.sign-client.yml

workflow:
  rules:
    - if: $CI_COMMIT_TAG

stages:
  - build
  - sign
  - deploy
  - post-release

build-job:
  stage: build
  script:
    - pip install hatch
    - hatch build
    - sha256sum dist/* > dist/checksums.txt
  artifacts:
      paths:
        - dist/
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/ && $CI_COMMIT_REF_PROTECTED == "true"'

checksum-signing-job:
  stage: sign
  extends: .submit-signing-request
  needs:
    - build-job
  variables:
    ARTIFACT: dist/checksums.txt
    SIGN_TYPE: GPG
    DOWNLOAD_DIR: dist
    LOGLEVEL: DEBUG
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/ && $CI_COMMIT_REF_PROTECTED == "true"'
  artifacts:
    paths:
      - dist/

deploy-job:
  stage: deploy
  script:
    - pip install hatch keyrings.alt
    - hatch --no-interactive publish
  needs:
    - checksum-signing-job
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/ && $CI_COMMIT_REF_PROTECTED == "true"'
      when: manual
      allow_failure: false

# The publish script builds and pushes both the standard image and the
# SecureApp image variant from the same release tag.
publish-docker-image:
  stage: post-release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.(0|[1-9][0-9]*))?$/ && $CI_COMMIT_REF_PROTECTED == "true"'
  variables:
    SIGNING_SERVICE_ADDR: "https://signing.prod.svc.splunk8s.io"
  id_tokens:
    CI_JOB_JWT:
      aud:
        - $CICD_VAULT_ADDR
        - $SIGNING_SERVICE_ADDR
  before_script:
    - ./docker/install-docker-deps.sh
    - ./docker/install-gh-deps.sh
  script:
    - ./docker/publish-docker-image.sh "$CI_COMMIT_TAG"
